<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Hồ Sơ Cá Nhân</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}" />
  </head>
  <body>
    <div class="profile-page">
      <header class="profile-header">
        <div class="header-actions">
          <a class="back-link" href="javascript:history.back()">← Quay lại</a>
        </div>
        <h1>Hồ Sơ Cá Nhân</h1>
      </header>

      <section class="profile-card">
        <div
          th:if="${successMessage}"
          style="
            margin-bottom: 12px;
            color: #0f5132;
            background: #d1e7dd;
            padding: 10px 12px;
            border-radius: 8px;
          "
        >
          <span th:text="${successMessage}"></span>
        </div>
        <div
          th:if="${errorMessage}"
          style="
            margin-bottom: 12px;
            color: #842029;
            background: #f8d7da;
            padding: 10px 12px;
            border-radius: 8px;
          "
        >
          <span th:text="${errorMessage}"></span>
        </div>
        <div class="profile-left">
          <div class="avatar-frame" id="avatarTrigger">
            <img
              th:src="${(nhanvien != null && nhanvien.imgNv != null && !nhanvien.imgNv.isBlank()) ? ((#strings.startsWith(nhanvien.imgNv, 'http') or #strings.startsWith(nhanvien.imgNv, '/')) ? nhanvien.imgNv : '/img_nv/' + nhanvien.imgNv) : '/img_nv/default-avatar.svg'}"
              alt="Ảnh nhân viên"
              onerror="this.src = '/img_nv/default-avatar.svg'"
            />
            <span class="avatar-edit-hint">Chọn ảnh</span>
          </div>
          <button class="edit-btn" id="editProfileBtn" type="button">
            Chỉnh sửa thông tin
          </button>
        </div>

        <form
          id="profileForm"
          class="profile-right profile-form"
          method="post"
          th:action="@{/profile/update}"
        >
          <input
            type="hidden"
            th:if="${_csrf != null}"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />
          <div class="info-block">
            <div class="info-title">Thông Tin Cá Nhân</div>
            <div class="info-list">
              <input
                class="avatar-input"
                id="avatarInput"
                type="file"
                accept="image/*"
                disabled
              />
              <input type="hidden" id="avatarUrl" name="avatarUrl" />
              <div class="info-row">
                <span class="label">Họ và Tên:</span>
                <input
                  class="inline-input value-field"
                  name="tenNv"
                  data-editable="true"
                  type="text"
                  readonly
                  th:value="${nhanvien != null ? nhanvien.tenNv : ''}"
                />
              </div>
              <div class="info-row">
                <span class="label">Chức Vụ:</span>
                <span
                  class="value"
                  th:text="${nhanvien != null && nhanvien.chucVu != null ? nhanvien.chucVu : 'Chưa cập nhật'}"
                ></span>
              </div>
              <div class="info-row">
                <span class="label">Ngày Sinh:</span>
                <input
                  class="inline-input value-field"
                  name="ngaySinh"
                  data-editable="true"
                  type="text"
                  placeholder="dd/MM/yyyy"
                  pattern="([0-9]{2}/[0-9]{2}/[0-9]{4}|[0-9]{8})"
                  title="Nhập ngày theo định dạng dd/MM/yyyy hoặc 8 số liền (vd: 22122005)"
                  readonly
                  th:value="${nhanvien != null && nhanvien.ngaySinh != null ? #temporals.format(nhanvien.ngaySinh, 'dd/MM/yyyy') : ''}"
                />
              </div>
              <div class="info-row">
                <span class="label">Giới Tính:</span>
                <select
                  class="inline-select value-field"
                  name="gioiTinh"
                  data-editable="true"
                  disabled
                >
                  <option value="">Chưa cập nhật</option>
                  <option
                    value="Nam"
                    th:selected="${nhanvien != null && nhanvien.gioiTinh == 'Nam'}"
                  >
                    Nam
                  </option>
                  <option
                    value="Nữ"
                    th:selected="${nhanvien != null && nhanvien.gioiTinh == 'Nữ'}"
                  >
                    Nữ
                  </option>
                  <option
                    value="Khác"
                    th:selected="${nhanvien != null && nhanvien.gioiTinh == 'Khác'}"
                  >
                    Khác
                  </option>
                </select>
              </div>
              <div class="info-row">
                <span class="label">CCCD:</span>
                <input
                  class="inline-input value-field"
                  name="cccd"
                  data-editable="true"
                  type="text"
                  inputmode="numeric"
                  maxlength="12"
                  pattern="[0-9]{12}"
                  title="CCCD gồm đúng 12 chữ số"
                  readonly
                  th:value="${nhanvien != null ? nhanvien.cccd : ''}"
                />
              </div>
            </div>
          </div>

          <div class="info-block">
            <div class="info-title">Thông Tin Liên Hệ</div>
            <div class="info-list">
              <div class="info-row">
                <span class="label">Số Điện Thoại:</span>
                <input
                  class="inline-input value-field"
                  name="sdt"
                  data-editable="true"
                  type="text"
                  inputmode="numeric"
                  maxlength="10"
                  pattern="(03[2-9]|05[2689]|07[06789]|08[1-9]|09[0-9])[0-9]{7}"
                  title="Số điện thoại di động Việt Nam gồm 10 số hợp lệ"
                  readonly
                  th:value="${nhanvien != null ? nhanvien.sdt : ''}"
                />
              </div>
              <div class="info-row">
                <span class="label">Email:</span>
                <span
                  class="value"
                  th:text="${nhanvien != null && nhanvien.gmail != null ? nhanvien.gmail : 'Chưa cập nhật'}"
                ></span>
              </div>
              <div class="info-row">
                <span class="label">Địa Chỉ:</span>
                <textarea
                  class="inline-input value-field"
                  name="diaChi"
                  data-editable="true"
                  rows="2"
                  readonly
                  th:text="${nhanvien != null ? nhanvien.diaChi : ''}"
                ></textarea>
              </div>
              <div class="info-row" th:if="${isPhucVu}">
                <span class="label">Cơ Sở:</span>
                <span
                  class="value"
                  th:text="${coSoName != null && !coSoName.isBlank() ? coSoName : 'Chưa cập nhật'}"
                ></span>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-secondary" type="button" id="cancelEditBtn">
              Hủy
            </button>
            <button class="btn-primary" type="submit">Lưu</button>
          </div>
        </form>
      </section>
    </div>
    <script th:inline="javascript">
      window.CLOUDINARY_CLOUD_NAME = /*[[${cloudinaryCloudName}]]*/ "";
      window.CLOUDINARY_UPLOAD_PRESET =
        /*[[${cloudinaryUploadPreset}]]*/ "coffee_upload";

      const editBtn = document.getElementById("editProfileBtn");
      const cancelBtn = document.getElementById("cancelEditBtn");
      const form = document.getElementById("profileForm");
      const editableFields = form?.querySelectorAll("[data-editable='true']");
      const avatarInput = document.getElementById("avatarInput");
      const avatarUrlInput = document.getElementById("avatarUrl");
      const avatarImg = document.querySelector(".avatar-frame img");
      const avatarTrigger = document.getElementById("avatarTrigger");
      const originalAvatarSrc = avatarImg?.getAttribute("src");
      const birthDateInput = form?.querySelector("input[name='ngaySinh']");

      const normalizeVnDateInput = (value) => {
        const raw = (value || "").trim();
        if (!raw) return "";
        if (/^\d{8}$/.test(raw)) {
          return `${raw.slice(0, 2)}/${raw.slice(2, 4)}/${raw.slice(4)}`;
        }
        return raw;
      };

      birthDateInput?.addEventListener("blur", () => {
        birthDateInput.value = normalizeVnDateInput(birthDateInput.value);
      });

      async function uploadImageToCloudinary(file, folder = "nhanvien") {
        const cloudName = (window.CLOUDINARY_CLOUD_NAME || "").trim();
        const uploadPreset = (window.CLOUDINARY_UPLOAD_PRESET || "").trim();
        if (!cloudName || !uploadPreset) {
          throw new Error("Thiếu cấu hình Cloudinary");
        }
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", uploadPreset);
        formData.append("folder", folder);

        const response = await fetch(
          `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
          {
            method: "POST",
            body: formData,
          },
        );

        const data = await response.json();
        if (!response.ok || !data.secure_url) {
          throw new Error(data.error?.message || "Upload ảnh thất bại");
        }
        return data.secure_url;
      }

      const setEditing = (isEditing) => {
        if (!form) return;
        form.classList.toggle("editing", isEditing);
        if (editBtn) editBtn.disabled = isEditing;
        editableFields?.forEach((field) => {
          if (field.tagName === "SELECT") {
            field.disabled = !isEditing;
          } else {
            field.readOnly = !isEditing;
          }
        });
        if (avatarInput) avatarInput.disabled = !isEditing;
      };

      editBtn?.addEventListener("click", () => setEditing(true));
      cancelBtn?.addEventListener("click", () => {
        form?.reset();
        if (avatarInput) avatarInput.value = "";
        if (avatarUrlInput) avatarUrlInput.value = "";
        if (avatarImg && originalAvatarSrc) {
          avatarImg.setAttribute("src", originalAvatarSrc);
        }
        setEditing(false);
      });

      avatarTrigger?.addEventListener("click", () => {
        if (avatarInput && !avatarInput.disabled) {
          avatarInput.click();
        }
      });

      avatarInput?.addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file || !avatarImg) return;
        const reader = new FileReader();
        reader.onload = () => {
          avatarImg.setAttribute("src", reader.result);
        };
        reader.readAsDataURL(file);
      });

      form?.addEventListener("submit", async (event) => {
        const file = avatarInput?.files?.[0];
        if (!file) return;

        event.preventDefault();

        try {
          const imageUrl = await uploadImageToCloudinary(file, "nhanvien");
          if (avatarUrlInput) {
            avatarUrlInput.value = imageUrl;
          }
          form.submit();
        } catch (error) {
          alert(error?.message || "Không thể tải ảnh lên Cloudinary");
        }
      });
    </script>
  </body>
</html>
