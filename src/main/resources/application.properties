spring.application.name=Quan_Coffee
spring.config.import=optional:file:.env[.properties]
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=5000,expireAfterWrite=3m,recordStats
spring.threads.virtual.enabled=true
# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATASOURCE (MYSQL)
# ===============================
    spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:quan_coffee}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    spring.datasource.username=${DB_USERNAME:}
    spring.datasource.password=${DB_PASSWORD:}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# HikariCP tuning (avoid stale connections on cloud MySQL)
spring.datasource.hikari.maximum-pool-size=24
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=64
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# ===============================
# CLOUDINARY
# ===============================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:coffee_upload}

# ===============================
# THYMELEAF (OPTIONAL)
# ===============================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.servlet.produce-partial-output-while-processing=true

# ===============================
# LOG (OPTIONAL)
# ===============================

logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.mail=INFO


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# Tomcat multipart/form limits (prevent multipart parse failures)
server.tomcat.max-part-count=100
server.tomcat.max-parameter-count=10000
server.tomcat.threads.max=300
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200
server.tomcat.keep-alive-timeout=20000
server.tomcat.max-keep-alive-requests=200

# Respect proxy headers (devtunnel/reverse proxy)
server.forward-headers-strategy=framework

# ===============================
# PERFORMANCE
# ===============================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml

spring.web.resources.cache.cachecontrol.max-age=7d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.must-revalidate=false
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.web.resources.cache.use-last-modified=true

# ===============================
# MAIL (OTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=false

# Google Maps API key (Distance Matrix) for shipping fee calculation
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

# ===============================
# VNPAY (Sandbox)
# ===============================
# Fill these values in .env or OS environment before testing BANK payment.
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL:}
