<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/truycap/Quenmatkhau.css" />
  </head>
  <body>
    <div class="card">
      <h1 class="title">Forgot Password</h1>
      <p class="subtitle">Enter your Gmail to receive OTP code.</p>

      <form id="requestOtpForm">
        <label class="label" for="gmail">Gmail</label>
        <input
          class="input"
          id="gmail"
          type="email"
          required
          placeholder="name@gmail.com"
        />
        <button class="btn" type="submit">Send OTP</button>
      </form>

      <div id="message" class="msg"></div>
      <a class="back-link" href="/login">Back to Login</a>
    </div>
    <script src="/truycap/Quenmatkhau.js"></script>
  </body>
</html>
