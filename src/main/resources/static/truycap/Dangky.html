<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoffeeGo - Đăng ký</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/truycap/Dangky.css?v=20260307-date1" />
  </head>
  <body>
    <div class="main-container">
      <div class="background-image">
        <img
          src="/img/z7463588836100_9c92ae464febb1ec2b21ec6ac60c6fce.jpg"
          alt="Coffee background"
        />
      </div>
      <div class="overlay"></div>

      <div class="login-card register-card">
        <div class="logo">
          <div class="logo-icon">
            <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
              <path
                d="M3.5 36.75V33.25H35V36.75H3.5ZM35 14V8.75H31.5V14H35ZM35 5.25C35.9283 5.25 36.8185 5.61875 37.4749 6.27513C38.1313 6.9315 38.5 7.82174 38.5 8.75V14C38.5 14.9283 38.1313 15.8185 37.4749 16.4749C36.8185 17.1313 35.9283 17.5 35 17.5H31.5V22.75C31.5 24.6065 30.7625 26.387 29.4497 27.6997C28.137 29.0125 26.3565 29.75 24.5 29.75H14C12.1435 29.75 10.363 29.0125 9.05025 27.6997C7.7375 26.387 7 24.6065 7 22.75V5.25H35ZM28 8.75H10.5V22.75C10.5 23.6783 10.8687 24.5685 11.5251 25.2249C12.1815 25.8813 13.0717 26.25 14 26.25H24.5C25.4283 26.25 26.3185 25.8813 26.9749 25.2249C27.6313 24.5685 28 23.6783 28 22.75V8.75Z"
                fill="white"
              />
            </svg>
          </div>
          <span class="logo-text">CoffeeGo</span>
        </div>

        <h1 class="welcome-text">Tạo tài khoản khách hàng</h1>

        <div id="registerAlert" class="alert" style="display: none"></div>

        <form class="login-form register-form" id="registerForm">
          <section class="step-section" id="stepOtp">
            <div class="input-wrapper">
              <input
                type="email"
                name="gmail"
                class="form-input"
                placeholder="Email"
                required
              />
            </div>

            <div class="input-wrapper">
              <input
                type="password"
                name="password"
                class="form-input"
                placeholder="Mật khẩu"
                required
              />
            </div>

            <div class="input-wrapper">
              <input
                type="password"
                name="confirmPassword"
                class="form-input"
                placeholder="Xác nhận mật khẩu"
                required
              />
            </div>

            <button type="button" class="login-btn" id="sendOtpBtn">
              Gửi mã OTP
            </button>

            <div class="otp-row">
              <input
                type="text"
                name="otp"
                class="form-input"
                placeholder="Nhập mã OTP"
              />
              <button type="button" class="secondary-btn" id="verifyOtpBtn">
                Xác nhận
              </button>
            </div>
          </section>

          <section class="step-section" id="stepProfile" style="display: none">
            <div class="input-wrapper">
              <input
                type="text"
                name="tenKh"
                class="form-input"
                placeholder="Họ và tên"
                required
              />
            </div>

            <div class="input-wrapper">
              <input
                type="text"
                name="sdt"
                class="form-input"
                placeholder="Số điện thoại"
                inputmode="numeric"
                maxlength="10"
                pattern="(03[2-9]|05[2689]|07[06789]|08[1-9]|09[0-9])[0-9]{7}"
                title="Số điện thoại di động Việt Nam gồm 10 số hợp lệ"
                required
              />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Giới tính</label>
                <select name="gioiTinh" required>
                  <option value="">-- chọn --</option>
                  <option value="Nam">Nam</option>
                  <option value="Nữ">Nữ</option>
                  <option value="Khác">Khác</option>
                </select>
              </div>

              <div class="form-group">
                <label>Ngày sinh</label>
                <input
                  type="text"
                  name="ngaySinh"
                  class="birth-date-input"
                  placeholder="dd/MM/yyyy"
                  pattern="([0-9]{2}/[0-9]{2}/[0-9]{4}|[0-9]{8})"
                  title="Nhập ngày theo định dạng dd/MM/yyyy hoặc 8 số liền (vd: 22122005)"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label>Địa chỉ</label>
              <textarea
                name="diaChi"
                rows="2"
                placeholder="Nhập địa chỉ"
                required
              ></textarea>
            </div>

            <button type="button" class="login-btn" id="completeBtn">
              Hoàn tất đăng ký
            </button>
          </section>

          <p class="signup-text">
            Đã có tài khoản?
            <a href="/login" class="signup-link">Đăng nhập</a>
          </p>
        </form>
      </div>
    </div>

    <script src="/truycap/Dangky.js?v=20260311-register-redirect1"></script>
  </body>
</html>
