<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="/truycap/Quenmatkhau.css" />
  </head>
  <body>
    <div class="card">
      <h1 class="title">Reset Password</h1>
      <p class="subtitle">Enter new password and confirmation password.</p>

      <form id="resetPasswordForm">
        <label class="label" for="newPassword">New password</label>
        <input
          class="input"
          id="newPassword"
          type="password"
          minlength="6"
          required
        />

        <label class="label" for="confirmPassword">Confirm password</label>
        <input
          class="input"
          id="confirmPassword"
          type="password"
          minlength="6"
          required
        />

        <button class="btn" type="submit">Reset Password</button>
      </form>

      <div id="message" class="msg"></div>
      <a class="back-link" href="/login">Back to Login</a>
    </div>
    <script src="/truycap/QuenmatkhauReset.js"></script>
  </body>
</html>
